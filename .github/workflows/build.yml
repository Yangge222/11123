name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "GRADLE_HOME=$(pwd)/gradle-8.4" >> $GITHUB_ENV
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          ./gradle-8.4/bin/gradle assembleDebug --no-daemon -p app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MCHelper-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
